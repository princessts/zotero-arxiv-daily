name: Send emails daily
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.REPOSITORY }}
          ref: ${{ vars.REF }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Run script
        env:
          # --- 自动读取你已有的所有 Secrets，不需要你重新填 ---
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          # 自动生成兼容 1.0 版本的配置文件
          cat << 'EOF' > config/custom.yaml
          zotero:
            user_id: ${oc.env:ZOTERO_ID}
            api_key: ${oc.env:ZOTERO_KEY}
            include_path: null
          email:
            sender: ${oc.env:SENDER}
            receiver: ${oc.env:RECEIVER}
            sender_password: ${oc.env:SENDER_PASSWORD}
            smtp_server: ${oc.env:SMTP_SERVER}
            smtp_port: ${oc.env:SMTP_PORT}
          llm:
            api:
              key: ${oc.env:OPENAI_API_KEY}
              base_url: ${oc.env:OPENAI_API_BASE, "https://api.openai.com/v1"}
            generation_kwargs:
              model: gpt-4o-mini
          source:
            arxiv:
              # 根据你的研究方向精准匹配的分类代码
              category: ["quant-ph", "physics.optics", "physics.ins-det", "cond-mat.supr-con"]
          executor:
            source: ['arxiv']
            reranker: local
          EOF
          
          echo "Use custom config: "
          cat config/custom.yaml
          uv run src/zotero_arxiv_daily/main.py
