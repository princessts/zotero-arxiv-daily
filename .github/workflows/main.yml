name: Send emails daily
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.REPOSITORY }}
          ref: ${{ vars.REF }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Run script
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          # 把你的 CUSTOM_CONFIG 加回来，保留你的模型等原有设置
          CUSTOM_CONFIG: ${{ vars.CUSTOM_CONFIG }}
        run: |
          # 1. 完整写入你已有的 CUSTOM_CONFIG（保留你设定的模型等所有配置）
          printf "%b\n" "$CUSTOM_CONFIG" > config/custom.yaml
          
          # 2. 仅“追加”（注意这里是 >>）1.0 版本报错缺失的强制项
          cat << 'EOF' >> config/custom.yaml
          
          llm:
            api:
              key: ${oc.env:OPENAI_API_KEY}
              base_url: ${oc.env:OPENAI_API_BASE}
          source:
            arxiv:
              # 你的专属研究方向
              category: ["quant-ph", "physics.optics", "physics.ins-det", "cond-mat.supr-con"]
          executor:
            source: ['arxiv']
            reranker: local
          EOF
          
          echo "Use custom config: "
          cat config/custom.yaml
          uv run src/zotero_arxiv_daily/main.py
