name: Send emails daily
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.REPOSITORY }}
          ref: ${{ vars.REF }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Run script
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          CUSTOM_CONFIG: ${{ vars.CUSTOM_CONFIG }}
        run: |
          # 1. 读取原有的 CUSTOM_CONFIG 变量
          printf "%b\n" "$CUSTOM_CONFIG" > config/custom.yaml
          
          # 2. 将 1.0 版本必需的新变量直接追加写死到代码里
          # 注意：这里改用 'EOF' (带单引号)，防止 bash 提前解析 $ 符号
          cat << 'EOF' >> config/custom.yaml
          
          source:
            arxiv:
              category: ["cs.AI","cs.CV","cs.LG","cs.CL"]
          executor:
            source: ['arxiv']
            reranker: local
          llm:
            api:
              key: ${oc.env:OPENAI_API_KEY}
              base_url: ${oc.env:OPENAI_API_BASE, "https://api.openai.com/v1"}
            generation_kwargs:
              model: gpt-4o-mini
          EOF
          
          # 3. 打印最终的配置并执行程序
          echo "Use custom config: "
          cat config/custom.yaml
          uv run src/zotero_arxiv_daily/main.py
